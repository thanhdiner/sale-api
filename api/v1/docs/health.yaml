# ═══════════════════════════════════════════════════════════════
# HEALTH
# ═══════════════════════════════════════════════════════════════
/health:
  get:
    tags: [Health]
    summary: Health check
    description: Kiểm tra server đang hoạt động
    responses:
      "200":
        description: Server OK
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  example: ok
                uptime:
                  type: number
                  example: 3600.5
