# ═══════════════════════════════════════════════════════════════
# CONTACT
# ═══════════════════════════════════════════════════════════════

/api/v1/contact:
  post:
    tags: [Contact]
    summary: Gửi email liên hệ
    description: Rate limit — tối đa 5 lần / 10 phút mỗi IP.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name, email, message]
            properties:
              name: { type: string, example: "Nguyễn Văn A" }
              email: { type: string, format: email, example: user@example.com }
              phone: { type: string, example: "0901234567" }
              subject: { type: string, example: "Hỏi về đơn hàng #12345" }
              message: { type: string, example: "Tôi muốn hỏi về..." }
    responses:
      "200":
        description: Email đã gửi thành công
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean }
                message: { type: string }
      "429":
        description: Quá nhiều yêu cầu — thử lại sau
      "400":
        description: Dữ liệu không hợp lệ
