# ═══════════════════════════════════════════════════════════════
# PAYMENT
# ═══════════════════════════════════════════════════════════════

/api/v1/payment/vnpay/create:
  post:
    tags: [Payment]
    summary: Tạo URL thanh toán VNPay
    security: [{ clientAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [orderId]
            properties:
              orderId: { type: string, example: 65f1a2b3c4d5e6f7a8b9c0d1 }
    responses:
      "200":
        description: URL thanh toán VNPay
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean }
                paymentUrl: { type: string, example: "https://sandbox.vnpayment.vn/..." }

/api/v1/payment/vnpay/return:
  get:
    tags: [Payment]
    summary: VNPay redirect callback (do VNPay gọi — không gọi trực tiếp)
    description: Endpoint này nhận redirect từ VNPay sau khi thanh toán. Redirect về frontend.
    parameters:
      - name: vnp_ResponseCode
        in: query
        schema: { type: string, example: "00" }
      - name: vnp_TxnRef
        in: query
        schema: { type: string }
    responses:
      "302":
        description: Redirect về frontend order-success page

/api/v1/payment/momo/create:
  post:
    tags: [Payment]
    summary: Tạo URL thanh toán MoMo
    security: [{ clientAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [orderId]
            properties:
              orderId: { type: string }
    responses:
      "200":
        description: URL thanh toán MoMo
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean }
                paymentUrl: { type: string }

/api/v1/payment/momo/callback:
  post:
    tags: [Payment]
    summary: MoMo IPN callback (do MoMo server gọi — không gọi trực tiếp)
    description: Nhận thông báo kết quả thanh toán từ MoMo server (IPN — Instant Payment Notification).
    responses:
      "204":
        description: Đã nhận và xử lý

/api/v1/payment/zalopay/create:
