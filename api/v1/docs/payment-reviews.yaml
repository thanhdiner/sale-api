# ═══════════════════════════════════════════════════════════════
# REVIEWS
# ═══════════════════════════════════════════════════════════════

/api/v1/reviews/{productId}:
  get:
    tags: [Reviews]
    summary: Lấy danh sách đánh giá của sản phẩm
    parameters:
      - name: productId
        in: path
        required: true
        schema: { type: string }
      - name: page
        in: query
        schema: { type: integer, default: 1 }
      - name: limit
        in: query
        schema: { type: integer, default: 10 }
      - name: sort
        in: query
        schema:
          type: string
          enum: [newest, helpful, highRating, lowRating]
          default: newest
      - name: rating
        in: query
        description: Lọc theo số sao (1–5)
        schema: { type: integer }
    responses:
      "200":
        description: Danh sách đánh giá
        content:
          application/json:
            schema:
              type: object
              properties:
                reviews:
                  type: array
                  items: { $ref: '#/components/schemas/Review' }
                total: { type: integer }
                summary:
                  type: object
                  properties:
                    avgRating: { type: number }
                    totalCount: { type: integer }
                    ratingDist:
                      type: object
                      example: { "1": 2, "2": 5, "3": 10, "4": 30, "5": 53 }

  post:
    tags: [Reviews]
    summary: Tạo đánh giá mới (upload ảnh/video)
    security: [{ clientAuth: [] }]
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [rating]
            properties:
              rating: { type: integer, minimum: 1, maximum: 5 }
              title: { type: string, maxLength: 200 }
              content: { type: string, maxLength: 2000 }
              files:
                type: array
                items: { type: string, format: binary }
    responses:
      "201":
        description: Đánh giá đã tạo
        content:
          application/json:
            schema:
              type: object
              properties:
                review: { $ref: '#/components/schemas/Review' }

/api/v1/reviews/{reviewId}:
  put:
    tags: [Reviews]
    summary: Cập nhật đánh giá
    security: [{ clientAuth: [] }]
    parameters:
      - name: reviewId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              rating: { type: integer }
              title: { type: string }
              content: { type: string }
              keepImages: { type: string, description: JSON array of image URLs to keep }
              keepVideos: { type: string, description: JSON array of video URLs to keep }
              files:
                type: array
                items: { type: string, format: binary }
    responses:
      "200":
        description: Đánh giá đã cập nhật

  delete:
    tags: [Reviews]
    summary: Xóa đánh giá
    security: [{ clientAuth: [] }]
    parameters:
      - name: reviewId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Đã xóa

/api/v1/reviews/{reviewId}/vote:
  post:
    tags: [Reviews]
    summary: Vote "hữu ích" cho đánh giá (toggle)
    security: [{ clientAuth: [] }]
    parameters:
      - name: reviewId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Đã vote / hủy vote

# ═══════════════════════════════════════════════════════════════
# PROMO CODES
# ═══════════════════════════════════════════════════════════════

/api/v1/promo-codes/validate:
  post:
    tags: [Promo Codes]
    summary: Kiểm tra / áp dụng mã giảm giá
    security: [{ clientAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [code, subtotal]
            properties:
              code: { type: string, example: SALE10 }
              subtotal: { type: number, example: 500000 }
    responses:
      "200":
        description: Kết quả kiểm tra mã
        content:
          application/json:
            schema:
              type: object
              properties:
                valid: { type: boolean }
                discount: { type: number }
                freeShipping: { type: boolean }
                message: { type: string }
                promoInfo: { type: object }

