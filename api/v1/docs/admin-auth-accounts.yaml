# ═══════════════════════════════════════════════════════════════
# ADMIN — ORDERS
# ═══════════════════════════════════════════════════════════════

/api/v1/admin/orders:
  get:
    tags: [Admin — Orders]
    summary: Danh sách đơn hàng (có lọc, phân trang)
    security: [{ adminAuth: [] }]
    parameters:
      - name: page
        in: query
        schema: { type: integer, default: 1 }
      - name: limit
        in: query
        schema: { type: integer, default: 10 }
      - name: status
        in: query
        schema:
          type: string
          enum: [pending, confirmed, shipping, completed, cancelled]
      - name: paymentStatus
        in: query
        schema: { type: string, enum: [pending, paid, failed] }
      - name: search
        in: query
        description: Tìm theo tên khách, số điện thoại
        schema: { type: string }
    responses:
      "200":
        description: Danh sách đơn hàng
        content:
          application/json:
            schema:
              type: object
              properties:
                orders:
                  type: array
                  items: { $ref: '#/components/schemas/Order' }
                total: { type: integer }
                currentPage: { type: integer }
                totalPage: { type: integer }

/api/v1/admin/orders/{id}:
  get:
    tags: [Admin — Orders]
    summary: Chi tiết đơn hàng
    security: [{ adminAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Chi tiết đơn hàng
        content:
          application/json:
            schema:
              type: object
              properties:
                order: { $ref: '#/components/schemas/Order' }
      "404":
        description: Không tìm thấy
  patch:
    tags: [Admin — Orders]
    summary: Cập nhật trạng thái đơn hàng
    security: [{ adminAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                enum: [pending, confirmed, shipping, completed, cancelled]
              paymentStatus: { type: string, enum: [pending, paid, failed] }
    responses:
      "200":
        description: Cập nhật thành công

/api/v1/admin/orders/delete/{id}:
  patch:
    tags: [Admin — Orders]
    summary: Xóa đơn hàng (soft delete)
    security: [{ adminAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Đã xóa

# ═══════════════════════════════════════════════════════════════
# ADMIN — DASHBOARD
# ═══════════════════════════════════════════════════════════════

/api/v1/admin/dashboard:
  get:
    tags: [Admin — Dashboard]
    summary: Dữ liệu tổng quan Dashboard
    security: [{ adminAuth: [] }]
    parameters:
      - name: period
        in: query
        description: "Khoảng thời gian: today | week | month | year"
        schema:
          type: string
          enum: [today, week, month, year]
          default: month
    responses:
      "200":
        description: Thống kê tổng quan
        content:
          application/json:
            schema:
              type: object
              properties:
                totalRevenue: { type: number }
                totalOrders: { type: integer }
                totalCustomers: { type: integer }
                totalProducts: { type: integer }
                revenueChart: { type: array, items: { type: object } }
                recentOrders:
                  type: array
                  items: { $ref: '#/components/schemas/Order' }
