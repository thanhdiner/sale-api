# ADMIN — BANK INFO
# ═══════════════════════════════════════════════════════════════

/api/v1/admin/bank-infos:
  get:
    tags: [Admin — Bank Info]
    summary: Danh sách thông tin ngân hàng
    security: [{ adminAuth: [] }]
    responses:
      "200":
        description: Danh sách bank info
  post:
    tags: [Admin — Bank Info]
    summary: Thêm thông tin ngân hàng
    security: [{ adminAuth: [] }]
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [bankName, accountNumber, accountHolder]
            properties:
              bankName: { type: string, example: "Vietcombank" }
              accountNumber: { type: string, example: "1234567890" }
              accountHolder: { type: string, example: "NGUYEN VAN A" }
              branch: { type: string }
              qrCode: { type: string, format: binary }
    responses:
      "201":
        description: Đã thêm thông tin ngân hàng

/api/v1/admin/bank-infos/active:
  get:
    tags: [Admin — Bank Info]
    summary: Lấy thông tin ngân hàng đang kích hoạt
    security: [{ adminAuth: [] }]
    responses:
      "200":
        description: Thông tin ngân hàng đang active

/api/v1/admin/bank-infos/{id}:
  patch:
    tags: [Admin — Bank Info]
    summary: Cập nhật thông tin ngân hàng
    security: [{ adminAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    requestBody:
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              bankName: { type: string }
              accountNumber: { type: string }
              accountHolder: { type: string }
              branch: { type: string }
              qrCode: { type: string, format: binary }
    responses:
      "200":
        description: Cập nhật thành công

/api/v1/admin/bank-infos/{id}/delete:
  patch:
    tags: [Admin — Bank Info]
    summary: Xóa thông tin ngân hàng (soft delete)
    security: [{ adminAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Đã xóa

/api/v1/admin/bank-infos/{id}/activate:
  patch:
    tags: [Admin — Bank Info]
    summary: Kích hoạt tài khoản ngân hàng này
    security: [{ adminAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Đã kích hoạt

