/api/v1/admin/reviews:
  get:
    tags: [Admin — Reviews]
    summary: Danh sách đánh giá (tất cả sản phẩm)
    security: [{ adminAuth: [] }]
    parameters:
      - name: page
        in: query
        schema: { type: integer, default: 1 }
      - name: limit
        in: query
        schema: { type: integer, default: 20 }
      - name: rating
        in: query
        schema: { type: integer }
      - name: productId
        in: query
        schema: { type: string }
    responses:
      "200":
        description: Danh sách reviews
        content:
          application/json:
            schema:
              type: object
              properties:
                reviews:
                  type: array
                  items: { $ref: '#/components/schemas/Review' }
                total: { type: integer }

/api/v1/admin/reviews/{reviewId}/reply:
  put:
    tags: [Admin — Reviews]
    summary: Trả lời đánh giá (seller reply)
    security: [{ adminAuth: [] }]
    parameters:
      - name: reviewId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [content]
            properties:
              content: { type: string, example: "Cảm ơn bạn đã mua hàng tại SmartMall!" }
    responses:
      "200":
        description: Đã trả lời
  delete:
    tags: [Admin — Reviews]
    summary: Xóa phản hồi của shop
    security: [{ adminAuth: [] }]
    parameters:
      - name: reviewId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Đã xóa phản hồi

/api/v1/admin/reviews/{reviewId}:
  delete:
    tags: [Admin — Reviews]
    summary: Xóa đánh giá
    security: [{ adminAuth: [] }]
    parameters:
      - name: reviewId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Đã xóa đánh giá

