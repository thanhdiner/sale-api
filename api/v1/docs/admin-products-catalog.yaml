# ═══════════════════════════════════════════════════════════════
# ADMIN — PRODUCTS
# ═══════════════════════════════════════════════════════════════

/api/v1/admin/products:
  get:
    tags: [Admin — Products]
    summary: Danh sách sản phẩm (có lọc, phân trang, sort)
    security: [{ adminAuth: [] }]
    parameters:
      - name: page
        in: query
        schema: { type: integer, default: 1 }
      - name: limit
        in: query
        schema: { type: integer, default: 10 }
      - name: status
        in: query
        schema: { type: string, enum: [active, inactive, all] }
      - name: productName
        in: query
        schema: { type: string }
      - name: product_category
        in: query
        description: ObjectId của danh mục
        schema: { type: string }
      - name: sortField
        in: query
        schema: { type: string, example: price }
      - name: sortOrder
        in: query
        schema: { type: string, enum: [ascend, descend] }
    responses:
      "200":
        description: Danh sách sản phẩm
        content:
          application/json:
            schema:
              type: object
              properties:
                products:
                  type: array
                  items: { $ref: '#/components/schemas/Product' }
                total: { type: integer }
                currentPage: { type: integer }
                totalPage: { type: integer }
                limitItems: { type: integer }

/api/v1/admin/products/create:
  post:
    tags: [Admin — Products]
    summary: Tạo sản phẩm mới
    security: [{ adminAuth: [] }]
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [title, price, stock]
            properties:
              title: { type: string, example: "iPhone 15 Pro" }
              slug: { type: string }
              price: { type: integer, example: 25000000 }
              costPrice: { type: integer }
              discountPercentage: { type: integer }
              stock: { type: integer, example: 100 }
              deliveryEstimateDays: { type: integer }
              productCategory: { type: string, description: ObjectId danh mục }
              description: { type: string }
              features:
                type: array
                items: { type: string }
              isTopDeal: { type: boolean }
              isFeatured: { type: boolean }
              status: { type: string, enum: [active, inactive] }
              thumbnail: { type: string, format: binary }
    responses:
      "200":
        description: Sản phẩm đã tạo
      "400":
        description: Dữ liệu không hợp lệ

/api/v1/admin/products/delete-many:
  patch:
    tags: [Admin — Products]
    summary: Xóa nhiều sản phẩm
    security: [{ adminAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [ids]
            properties:
              ids:
                type: array
                items: { type: string }
    responses:
      "200":
        description: Xóa thành công

/api/v1/admin/products/change-status-many:
  patch:
    tags: [Admin — Products]
    summary: Đổi trạng thái nhiều sản phẩm
    security: [{ adminAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [ids, status]
            properties:
              ids: { type: array, items: { type: string } }
              status: { type: string, enum: [active, inactive] }
    responses:
      "200":
        description: Cập nhật thành công

/api/v1/admin/products/change-position-many:
  patch:
    tags: [Admin — Products]
    summary: Cập nhật vị trí nhiều sản phẩm (drag & drop sort)
    security: [{ adminAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [data]
            properties:
              data:
                type: array
                items:
                  type: object
                  properties:
                    _id: { type: string }
                    position: { type: integer }
    responses:
      "200":
        description: Cập nhật vị trí thành công

/api/v1/admin/products/{id}:
  get:
    tags: [Admin — Products]
    summary: Chi tiết sản phẩm
    security: [{ adminAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Chi tiết sản phẩm
        content:
          application/json:
            schema:
              type: object
              properties:
                product: { $ref: '#/components/schemas/Product' }
      "404":
        description: Không tìm thấy

/api/v1/admin/products/delete/{id}:
  patch:
    tags: [Admin — Products]
    summary: Xóa sản phẩm (soft delete)
    security: [{ adminAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Đã xóa

/api/v1/admin/products/changeStatus/{id}:
  patch:
    tags: [Admin — Products]
    summary: Toggle trạng thái sản phẩm (active ↔ inactive)
    security: [{ adminAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              status: { type: string, enum: [active, inactive] }
    responses:
      "200":
        description: Đã đổi trạng thái

/api/v1/admin/products/edit/{id}:
  patch:
    tags: [Admin — Products]
    summary: Cập nhật sản phẩm
    security: [{ adminAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    requestBody:
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              title: { type: string }
              slug: { type: string }
              price: { type: integer }
              costPrice: { type: integer }
              discountPercentage: { type: integer }
              stock: { type: integer }
              productCategory: { type: string }
              description: { type: string }
              features: { type: array, items: { type: string } }
              isTopDeal: { type: boolean }
              isFeatured: { type: boolean }
              status: { type: string, enum: [active, inactive] }
              thumbnail: { type: string, format: binary }
    responses:
      "200":
        description: Sản phẩm đã cập nhật

